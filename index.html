const TABS = ["Home", "Flashcards", "B1", "B2", "Grammar", "Word", "Chat"];

const WORD_OF_THE_DAY = [
  { kr:"반갑습니다",rom:"bangapseumnida",en:"Nice to meet you",origin:"From 반갑다 (to be glad/pleased) — a pure native Korean word expressing genuine delight at meeting someone.",uses:["Formal first meeting","After an introduction","More heartfelt than 안녕하세요 alone"],examples:[{kr:"처음 뵙겠습니다. 반갑습니다!",rom:"Cheoeum boepgesseumnida. Bangapseumnida!",en:"Nice to meet you for the first time!"},{kr:"만나서 반갑습니다.",rom:"Mannaseo bangapseumnida.",en:"I'm glad to meet you."}],tip:"Koreans often say this right after their name and job title when being introduced. Replying with the same phrase is perfectly natural."},
  { kr:"괜찮아요",rom:"gwaenchanayo",en:"It's okay / I'm fine / No worries",origin:"From 괜찮다 — believed to derive from 공연히 찮다. Now universally used to express that something is acceptable or fine.",uses:["Declining an offer politely","Reassuring someone","Saying you're okay after a mishap"],examples:[{kr:"도와드릴까요? 아, 괜찮아요!",rom:"Dowadeurilkkayo? A, gwaenchanayo!",en:"Can I help you? Oh, I'm fine, thanks!"},{kr:"늦어서 미안해요. — 괜찮아요!",rom:"Neujeoseo mianhaeyo. — Gwaenchanayo!",en:"Sorry I'm late. — No worries!"}],tip:"This one word can replace 'sorry', 'no thank you', 'it's alright', and 'I'm okay' depending on context — incredibly versatile!"},
  { kr:"어서 오세요",rom:"eoseo oseyo",en:"Welcome! / Please come in quickly!",origin:"어서 means 'quickly/hurry' and 오세요 means 'please come'. Together it expresses an eager, warm welcome.",uses:["Said by shopkeepers and restaurant staff","Welcoming guests to your home","You'll hear this constantly in Korea"],examples:[{kr:"어서 오세요! 몇 분이세요?",rom:"Eoseo oseyo! Myeot buniseyo?",en:"Welcome! How many in your party?"},{kr:"어서 오세요, 앉으세요!",rom:"Eoseo oseyo, anjeuseyo!",en:"Welcome, please sit down!"}],tip:"You don't need to respond to this — just smile and nod. Koreans say it reflexively the moment a customer enters."},
  { kr:"잠깐만요",rom:"jamkkanmanyo",en:"Just a moment / One second",origin:"잠깐 means 'a brief moment' (from Chinese 暫間) + 만 (only) + 요 (polite ending). Used to ask for a brief pause.",uses:["Asking someone to wait","Buying time when you don't understand","Stopping someone before they leave"],examples:[{kr:"잠깐만요! 질문이 있어요.",rom:"Jamkkanmanyo! Jilmuni isseoyo.",en:"One moment! I have a question."},{kr:"잠깐만요, 다시 말해주세요.",rom:"Jamkkanmanyo, dasi malhaejuseyo.",en:"Hold on, please say that again."}],tip:"Perfect phrase when you need a second to think or when someone is walking away. Much softer than 잠깐! alone."},
  { kr:"맛있어요",rom:"masisseoyo",en:"It's delicious / It tastes good",origin:"맛 (taste/flavor) + 있다 (to have/exist) = literally 'to have taste'. One of the most important phrases when eating with Koreans!",uses:["Complimenting food at a restaurant","Thanking a host who cooked for you","Reacting to street food"],examples:[{kr:"와, 정말 맛있어요!",rom:"Wa, jeongmal masisseoyo!",en:"Wow, this is really delicious!"},{kr:"어머니, 음식이 너무 맛있어요.",rom:"Eomeoni, eumsigi neomu masisseoyo.",en:"Mom, the food is so delicious."}],tip:"Saying this to a Korean host or restaurant owner is one of the best compliments you can give. Their face will light up!"},
  { kr:"실례합니다",rom:"sillyehamnida",en:"Excuse me (formal)",origin:"From Chinese 失禮 (sille) meaning 'to lose/lack courtesy', + 합니다 (formal verb ending).",uses:["Getting a stranger's attention","Passing through a crowd","Starting a question with a stranger"],examples:[{kr:"실례합니다, 화장실이 어디예요?",rom:"Sillyehamnida, hwajangsiri eodiyeyo?",en:"Excuse me, where is the restroom?"},{kr:"실례합니다! 잠깐 지나갈게요.",rom:"Sillyehamnida! Jamkkan jinagalgeyo.",en:"Excuse me! I'll just pass through."}],tip:"More formal than 저기요 (hey/excuse me), which is what you'd call a waiter. Use 실례합니다 with strangers on the street."},
  { kr:"얼마예요",rom:"eolmayeyo",en:"How much is it?",origin:"얼마 is a native Korean word meaning 'how much/how many' + 예요 (polite 'is'). Essential for any shopping situation.",uses:["Asking prices at markets","Checking taxi fares","Asking about quantities"],examples:[{kr:"이거 얼마예요?",rom:"Igeo eolmayeyo?",en:"How much is this?"},{kr:"사과 한 개에 얼마예요?",rom:"Sagwa han gaee eolmayeyo?",en:"How much is one apple?"}],tip:"At traditional markets (시장), you can often negotiate. Start with 얼마예요? then try 깎아 주세요 (please give me a discount)!"},
  { kr:"고마워요",rom:"gomawoyo",en:"Thank you (casual-polite)",origin:"From 고맙다 — a pure native Korean word for gratitude, warmer and more personal than 감사합니다.",uses:["Thanking friends or people your age","Casual but still respectful situations","More heartfelt than 감사합니다 in close relationships"],examples:[{kr:"도와줘서 고마워요!",rom:"Dowajwoseo gomawoyo!",en:"Thank you for helping me!"},{kr:"선물 고마워요.",rom:"Seonmul gomawoyo.",en:"Thank you for the gift."}],tip:"감사합니다 is more formal (use with elders or strangers). 고마워요 feels warmer — like 'thanks so much' between friends."},
  { kr:"죄송합니다",rom:"joesonghamnida",en:"I'm very sorry (formal)",origin:"From Chinese 罪悚 (joesung) meaning 'to feel guilty/ashamed' + 합니다. A deep, sincere apology.",uses:["Formal apology to elders or strangers","Bumping into someone","Making a mistake in a professional setting"],examples:[{kr:"늦어서 죄송합니다.",rom:"Neujeoseo joesonghamnida.",en:"I'm very sorry for being late."},{kr:"죄송합니다, 제가 실수했어요.",rom:"Joesonghamnida, jega silsuhaesseoyo.",en:"I'm so sorry, I made a mistake."}],tip:"미안해요 is casual sorry (friends/peers). 죄송합니다 shows deep respect — always use this with elders or in formal situations."},
  { kr:"화이팅",rom:"hwaiting",en:"You can do it! / Fighting! / Go!",origin:"A Korean adaptation of the English word 'fighting' — used as a cheer of encouragement.",uses:["Cheering someone on before an exam","Encouraging a friend","Self-motivation"],examples:[{kr:"시험 잘 봐요! 화이팅!",rom:"Siheom jal bwayo! Hwaiting!",en:"Do well on your exam! You got this!"},{kr:"오늘도 화이팅!",rom:"Oneuldo hwaiting!",en:"You've got this today too!"}],tip:"You'll hear K-drama characters shout this constantly. It's one of those words that makes Koreans smile when a foreigner uses it naturally."},
  { kr:"천천히",rom:"cheoncheonhi",en:"Slowly / Take your time",origin:"From 천천하다 — a pure Korean expression meaning 'to be slow and relaxed'. The -히 ending turns it into an adverb.",uses:["Asking someone to speak slower","Telling a driver to slow down","Telling yourself to relax"],examples:[{kr:"천천히 말해주세요.",rom:"Cheoncheonhi malhaejuseyo.",en:"Please speak slowly."},{kr:"천천히 드세요!",rom:"Cheoncheonhi deuseyo!",en:"Take your time eating! (Enjoy your meal!)"}],tip:"천천히 드세요 is what Koreans say as food is served — like 'bon appétit'. It literally means 'eat slowly' but implies 'enjoy!'"},
  { kr:"맞아요",rom:"majayo",en:"That's right / Exactly / Yes, correct",origin:"From 맞다 — native Korean for 'to be correct/to match'. A casual, energetic way to affirm what someone said.",uses:["Agreeing with someone enthusiastically","Confirming information","Reacting to something true"],examples:[{kr:"그 식당 맛있죠? — 맞아요, 너무 좋아요!",rom:"Geu sikdang masitjyo? — Majayo, neomu joayo!",en:"That restaurant is delicious, right? — Exactly, I love it!"},{kr:"오늘 월요일이에요? — 맞아요!",rom:"Oneul woryoirieyo? — Majayo!",en:"Is today Monday? — That's right!"}],tip:"More energetic than 네 (yes). Koreans use it like 'Exactly!' or 'You're so right!' — great for conversations with locals."},
];

  { q:"What is the topic marker particle?",opts:["이/가","을/를","은/는","에"],ans:2,exp:"은/는 marks the topic. Use 은 after consonant, 는 after vowel. 저는 = As for me..."},

  { q:"What does 에서 express?",opts:["Static existence","Direction","The location where an action happens","Possession"],ans:2,exp:"에서 = where an action takes place. 카페에서 공부해요 = I study at the café."},

  { q:"Which counter is used for general objects?",opts:["마리","잔","개","권"],ans:2,exp:"개 is the general object counter. 사과 두 개 = two apples."},

  { q:"How do you express 'there is A and B'?",opts:["A 또는 B이/가 있어요","A하고 B이/가 있어요","A이/가 B 있어요","A와/과 B에 있어요"],ans:1,exp:"하고 = 'and' between nouns. A하고 B이/가 있어요 = There is A and B."},

  { q:"What is the past tense ending for 하다 verbs?",opts:["했어요","하었어요","했습니다만","하아요"],ans:0,exp:"하다 → 했어요 (past). 공부하다 → 공부했어요. 일하다 → 일했어요."},
  { q:"How do you say 'I want to eat'?",opts:["먹어요","먹고 싶어요","먹을게요","먹었어요"],ans:1,exp:"Verb stem + 고 싶어요 = want to. 먹다 → 먹고 싶어요."},
  { q:"Which sentence is correct SOV order?",opts:["저는 먹어요 사과를","사과를 저는 먹어요","저는 사과를 먹어요","먹어요 저는 사과를"],ans:2,exp:"Standard SOV: 저는 (S) 사과를 (O) 먹어요 (V). Korean is flexible but this is most natural."},
  { q:"What does 한테 express?",opts:["Location","Direction to a person","Possession","Time"],ans:1,exp:"한테 = to/from a person. 친구한테 줘요 = I give it to my friend. 한테서 = from a person."},
  { q:"How do you form a question in Korean?",opts:["Add 'do' before the verb","Add 까/요 rising intonation","Reverse subject and verb","Add a question word at the start"],ans:1,exp:"Korean questions use rising intonation with 요. 가요? = Are you going? 먹어요? = Are you eating?"},
  { q:"What does ~(으)세요 express?",opts:["Past tense","A suggestion to the listener","Polite request/command","Future tense"],ans:2,exp:"(으)세요 is a polite imperative/honorific. 앉으세요 = Please sit. 드세요 = Please eat."},
  { q:"How do you say 'Let's go together'?",opts:["같이 가요","함께 가세요","가고 싶어요","가야 해요"],ans:0,exp:"같이 가요 = Let's go together. 같이 = together. The 요 ending can suggest invitation."},

  { q:"What does 안 do when placed before a verb?",opts:["Makes it past tense","Makes it negative","Makes it formal","Makes it a question"],ans:1,exp:"안 + verb = negation. 안 가요 = I'm not going. 안 먹어요 = I'm not eating."},

// B2 Flashcard sub-component
function B2FlashCard({ card, onMastered, onAgain, showHint, onHint, isGotIt }) {
  const [revealed, setRevealed] = useState(false);
  return (
    <div>
      {/* Tap anywhere on card to reveal */}
      <div
        onClick={() => { if (!revealed) setRevealed(true); }}
        style={{ background:"#fff", borderRadius:16, padding:"28px 24px", border:`1.5px solid ${revealed ? C.blue : C.border}`, marginBottom:16, minHeight:200, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", cursor: revealed ? "default" : "pointer", transition:"border-color 0.2s" }}
      >
        {!revealed && <div style={{ fontSize:11, color:C.muted, marginBottom:10, letterSpacing:1 }}>TAP TO REVEAL</div>}
        <div style={{ fontSize:13, fontWeight:600, color:C.muted, marginBottom:12, textTransform:"uppercase", letterSpacing:0.5 }}>{card.q || card.kr}</div>
        {/* Hint shown before reveal */}
        {!revealed && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
            {showHint && card.ex && (
              <div style={{ background:C.light, borderRadius:8, padding:"6px 12px", fontSize:12, color:C.muted, fontStyle:"italic" }}>
                💬 {card.ex.kr}
              </div>
            )}
            {!showHint && card.ex && (
              <button onClick={e=>{e.stopPropagation();onHint();}} style={{ padding:"5px 12px", background:"none", color:C.muted, border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", fontSize:11 }}>hint</button>
            )}
          </div>
        )}
        {revealed && (
          <div style={{ width:"100%", marginTop:4 }}>
            <div style={{ fontSize:28, fontWeight:800, color:C.blue, marginBottom:4 }}>{card.kr}</div>
            <div style={{ fontSize:13, color:C.muted, fontStyle:"italic", marginBottom:6 }}>{card.rom}</div>
            <div style={{ fontSize:15, fontWeight:600, color:C.text, marginBottom:10 }}>{card.en}</div>
            {card.ex && (
              <div style={{ background:C.blueLight, borderRadius:8, padding:"8px 12px", fontSize:13, color:C.blue, textAlign:"left" }}>
                <div style={{ fontWeight:600 }}>{card.ex.kr}</div>
                <div style={{ color:C.muted, fontSize:12, marginTop:2 }}>{card.ex.en}</div>
              </div>
            )}
            {card.note && (
              <div style={{ background:C.light, borderRadius:8, padding:"8px 12px", fontSize:12, color:C.muted, textAlign:"left", marginTop:8 }}>{card.note}</div>
            )}
          </div>
        )}
      </div>
      {revealed && (
        <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
          <button onClick={()=>{setRevealed(false);onAgain();}} style={{ padding:"12px 28px", background:"#fff", color:C.red, border:`1.5px solid ${C.red}`, borderRadius:12, cursor:"pointer", fontSize:20, lineHeight:1 }}>✕</button>
          <button onClick={()=>{setRevealed(false);onMastered();}} style={{ padding:"12px 28px", background:"#fff", color:C.green, border:`1.5px solid ${C.green}`, borderRadius:12, cursor:"pointer", fontSize:20, lineHeight:1 }}>✓</button>
        </div>
      )}
    </div>
  );
}

    { q:"Hairdresser — sentence", kr:"미용사예요. 미용실에서 일해요.", rom:"Miyongsayeyo. Miyongsire-seo ilhaeyo.", en:"(I am a) hairdresser. I work at a hair salon.", note:"미용실 = beauty salon." },
    { q:"Driver — sentence", kr:"운전사예요. 버스/택시를 운전해요.", rom:"Unjeonsa yeyo. Beoseu/taeksi-reul unjeonhaeyo.", en:"(I am a) driver. I drive a bus/taxi.", note:"운전하다 = to drive." },
    { q:"Flight attendant — sentence", kr:"승무원이에요. 비행기에서 일해요.", rom:"Seungmuwon ieyo. Bihaenggi-eseo ilhaeyo.", en:"(I am a) flight attendant. I work on an airplane.", note:"승무원 ends in consonant ㄴ → 이에요." },
    { q:"Teacher — sentence", kr:"선생님이에요. 학교에서 가르쳐요.", rom:"Seonsaengnim ieyo. Hakgyo-eseo gareuchyeoyo.", en:"(I am a) teacher. I teach at a school.", note:"가르치다 = to teach → 가르쳐요." },
    { q:"Pharmacist — sentence", kr:"약사예요. 약국에서 일해요.", rom:"Yaksa yeyo. Yakguge-seo ilhaeyo.", en:"(I am a) pharmacist. I work at a pharmacy.", note:"약사 ends in vowel ㅏ → 예요. 약국 = pharmacy." },
    { q:"How do you say 'is NOT a doctor'?", kr:"의사가 아니에요.", rom:"Uisa-ga anieyo.", en:"(He/she) is not a doctor.", note:"Vowel ending → 가 아니에요. Consonant ending → 이 아니에요. 학생이 아니에요." },
    { q:"하다 verb conjugation rule", kr:"하다 → 해요", rom:"hada → haeyo", en:"하다 verbs → 해요 (polite present)", note:"일하다→일해요 · 공부하다→공부해요 · 청소하다→청소해요 · 운동하다→운동해요" },
    { q:"아요/어요 conjugation rule", kr:"ㅏ,ㅗ → 아요 / others → 어요", rom:"a/o vowel → ayo / others → eoyo", en:"Bright vowel → 아요, dark vowel → 어요", note:"가다→가요 · 먹다→먹어요 · 오다→와요 · 있다→있어요" },
    { q:"How do you say 'What does he/she do at work?'", kr:"무슨 일을 해요?", rom:"Museun ireul haeyo?", en:"What kind of work do (they) do?", note:"무슨 = what kind of. 일 = work. 해요 = do (polite)." },

    { q:"How do you say 'I work part-time'?", kr:"아르바이트를 해요. / 알바를 해요.", rom:"Areubaiteureul haeyo. / Albareul haeyo.", en:"I work part-time.", note:"아르바이트 (from German 'Arbeit') → shortened to 알바 in casual speech." },
    { q:"How do you say 'I am retired'?", kr:"은퇴했어요. / 퇴직했어요.", rom:"Euntoehae-sseoyo. / Toejighaesseoyo.", en:"I have retired.", note:"은퇴 = retirement. ~했어요 = past tense of 하다." },
    { q:"How do you say 'I am looking for a job'?", kr:"취업 준비 중이에요.", rom:"Chwieop junbi jungieeyo.", en:"I am preparing for employment / job hunting.", note:"취업 = getting a job. 준비 = preparation. 중이에요 = in the middle of." },
    { q:"How do you say 'I am a graduate student'?", kr:"대학원생이에요.", rom:"Daehagwonsaeng ieyo.", en:"I am a graduate student.", note:"대학원 = graduate school. 대학생 = undergraduate student." },
    { q:"How do you say 'I work at a hospital'?", kr:"병원에서 일해요.", rom:"Byeongwone-seo ilhaeyo.", en:"I work at a hospital.", note:"에서 = location of action. 일하다 = to work → 일해요." },
    { q:"Accountant — sentence", kr:"회계사예요. 회사에서 일해요.", rom:"Hoegyesayeyo. Hoesae-seo ilhaeyo.", en:"(I am an) accountant. I work at a company.", note:"회계사 ends in vowel ㅏ → 예요." },
    { q:"Engineer — sentence", kr:"엔지니어예요. 회사에서 일해요.", rom:"Enjiniyeoyeyo. Hoesae-seo ilhaeyo.", en:"(I am an) engineer. I work at a company.", note:"엔지니어 ends in vowel ㅓ → 예요." },
    { q:"Designer — sentence", kr:"디자이너예요. 디자인 회사에서 일해요.", rom:"Dijaineoye-yo. Dijain hoesae-seo ilhaeyo.", en:"(I am a) designer. I work at a design company.", note:"디자이너 ends in vowel ㅓ → 예요." },
    { q:"How do you say 'I like my job'?", kr:"제 직업을 좋아해요.", rom:"Je jigeobeul joahaeyo.", en:"I like my job.", note:"직업 = job/occupation. 을/를 = object particle. 좋아하다 = to like." },

  "Locations": [
    { q:"How do you ask 'where is it?'", kr:"어디예요? / 어디에 있어요?", rom:"Eodiyeyo? / Eodie isseoyo?", en:"Where is it? / Where is it located?", note:"어디예요 is casual; 어디에 있어요 specifically asks about location." },

    { q:"Bookstore", kr:"서점이에요.", rom:"Seojeom ieyo.", en:"It's a bookstore.", note:"서점에서 책을 사요 = I buy books at the bookstore." },
    { q:"Airport", kr:"공항이에요.", rom:"Gonghang ieyo.", en:"It's an airport.", note:"공항에 가요 = I go to the airport. 인천 국제공항 = Incheon Int'l Airport." },
    { q:"Hospital", kr:"병원이에요.", rom:"Byeongwon ieyo.", en:"It's a hospital.", note:"병원에 가요 = I go to the hospital." },

    { q:"How do you say 'across from'?", kr:"건너편에 있어요.", rom:"Geonneopyeone isseoyo.", en:"It's across from / on the opposite side.", note:"도서관 건너편에 있어요 = It's across from the library." },
    { q:"How do you say 'nearby'?", kr:"근처에 있어요.", rom:"Geuncheoe isseoyo.", en:"It's nearby / in the vicinity.", note:"집 근처에 뭐가 있어요? = What's near your house?" },
    { q:"How do you say 'approximately 5 minutes on foot'?", kr:"걸어서 5분쯤 걸려요.", rom:"Georeo-seo o bun jjeum geollyeoyo.", en:"It takes about 5 minutes on foot.", note:"걸어서 = on foot. 쯤 = approximately. 분 = minutes." },

    { q:"How do you say 'turn left'?", kr:"왼쪽으로 가세요.", rom:"Oenjjok-euro gaseyo.", en:"Go to the left / turn left.", note:"오른쪽으로 = to the right. ~으로 가세요 = please go toward." },
    { q:"How do you say 'go straight'?", kr:"직진하세요.", rom:"Jikjin haseyo.", en:"Go straight.", note:"직진 = going straight. Very useful when giving or receiving directions." },

    { q:"How do you say 'How long does it take?'", kr:"얼마나 걸려요?", rom:"Eolmana geollyeoyo?", en:"How long does it take?", note:"걸리다 = to take (time). 10분 걸려요 = It takes 10 minutes." },
    { q:"How do you say 'I take the subway'?", kr:"지하철을 타요.", rom:"Jihacheoreul tayo.", en:"I take the subway.", note:"타다 = to ride/board. 버스를 타요 = I take the bus." },

    { q:"How do you say 'it's between the bank and the café'?", kr:"은행하고 카페 사이에 있어요.", rom:"Eunhaenghago kape saie isseoyo.", en:"It's between the bank and the café.", note:"하고 = and. 사이에 = between. A하고 B 사이에 있어요." },

  "Adjacencies": [
    { q:"위 — what does it mean?", kr:"위에 있어요.", rom:"wie isseoyo.", en:"It's on top / above.", note:"책상 위에 있어요 = It's on top of the desk." },

    { q:"앞 — what does it mean?", kr:"앞에 있어요.", rom:"ape isseoyo.", en:"It's in front of.", note:"학교 앞에 있어요 = It's in front of the school." },

    { q:"밖 — what does it mean?", kr:"밖에 있어요.", rom:"bake isseoyo.", en:"It's outside.", note:"밖에 나가요 = I go outside. 건물 밖에 있어요 = It's outside the building." },
    { q:"옆 — what does it mean?", kr:"옆에 있어요.", rom:"yeope isseoyo.", en:"It's next to / beside.", note:"커피숍 옆에 있어요 = It's next to the coffee shop." },
    { q:"사이 — what does it mean?", kr:"사이에 있어요.", rom:"saie isseoyo.", en:"It's between.", note:"두 건물 사이에 있어요 = It's between two buildings." },
    { q:"오른쪽 — what does it mean?", kr:"오른쪽에 있어요.", rom:"oreunjjoge isseoyo.", en:"It's on the right side.", note:"오른쪽으로 가세요 = Go to the right." },
    { q:"왼쪽 — what does it mean?", kr:"왼쪽에 있어요.", rom:"oenjjoge isseoyo.", en:"It's on the left side.", note:"왼쪽에 있어요 = It's on the left." },
    { q:"How do you ask 'what's on the desk?'", kr:"책상 위에 뭐가 있어요?", rom:"Chaeksang wie mwoga isseoyo?", en:"What is on top of the desk?", note:"Answer: 책상 위에 [물건]이/가 있어요." },

    { q:"How do you say 'the cat is under the chair'?", kr:"고양이가 의자 아래에 있어요.", rom:"Goyangi-ga uija arae-e isseoyo.", en:"The cat is under the chair.", note:"고양이가 = cat (subject). 의자 아래에 = under the chair." },
    { q:"How do you say 'it's in the bag'?", kr:"가방 안에 있어요.", rom:"Gabang ane isseoyo.", en:"It's inside the bag.", note:"안 = inside. 가방 = bag." },

    { q:"How do you say 'the café is next to the bookstore'?", kr:"카페가 서점 옆에 있어요.", rom:"Kape-ga seojeom yeope isseoyo.", en:"The café is next to the bookstore.", note:"옆에 = next to. 서점 = bookstore." },

    { q:"How do you describe where you live in a building?", kr:"저는 3층에 살아요.", rom:"Jeoneun sam cheunge sarayo.", en:"I live on the 3rd floor.", note:"층 = floor. 살아요 = I live (regular present)." },

    { q:"How do you say 'it's between the bed and the desk'?", kr:"침대하고 책상 사이에 있어요.", rom:"Chimdaehago chaeksang saie isseoyo.", en:"It's between the bed and the desk.", note:"하고 = and. 사이에 = between." },
    { q:"How do you say 'the store is on the first floor'?", kr:"가게가 1층에 있어요.", rom:"Kage-ga il cheunge isseoyo.", en:"The store is on the first floor.", note:"1층 = first floor (ground level in Korea). 가게 = store." },
    { q:"How do you ask 'where did you put it?'", kr:"어디에 놓았어요?", rom:"Eodie noasseoyo?", en:"Where did you put it?", note:"놓다 = to put/place. 놓았어요 = placed (past tense)." },
    { q:"How do you say 'it fell under the bed'?", kr:"침대 아래로 떨어졌어요.", rom:"Chimdae araero tteoreojyeosseoyo.", en:"It fell under the bed.", note:"떨어지다 = to fall. 아래로 = toward the bottom." },

// B1 Flashcard sub-component
function B1Card({ card, index, total, onMastered, onAgain }) {
  const [revealed, setRevealed] = useState(false);
  const [showExercises, setShowExercises] = useState(false);
  return (
    <div>
      <div style={{ textAlign:"center", marginBottom:8, fontSize:13, color:C.muted }}>{index + 1} / {total}</div>
      {/* Tap anywhere on card to reveal */}
      <div
        onClick={() => { if (!revealed) setRevealed(true); }}
        style={{ background:"#fff", borderRadius:16, padding:"28px 24px", border:`1.5px solid ${revealed ? C.blue : C.border}`, marginBottom:16, minHeight:200, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", cursor: revealed ? "default" : "pointer", transition:"border-color 0.2s" }}
      >
        {!revealed && <div style={{ fontSize:11, color:C.muted, marginBottom:10, letterSpacing:1 }}>TAP TO REVEAL</div>}
        <div style={{ fontSize:13, fontWeight:600, color:C.muted, marginBottom:12, textTransform:"uppercase", letterSpacing:0.5 }}>{card.q}</div>
        {revealed && (
          <div style={{ width:"100%", marginTop:4 }}>
            <div style={{ fontSize:28, fontWeight:800, color:C.blue, marginBottom:4 }}>{card.kr}</div>
            <div style={{ fontSize:13, color:C.muted, fontStyle:"italic", marginBottom:6 }}>{card.rom}</div>
            <div style={{ fontSize:15, fontWeight:600, color:C.text, marginBottom:12 }}>{card.en}</div>
            {/* Exercises/phrases — hidden behind toggle */}
            {card.exercises && (
              <div style={{ marginBottom:8 }} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>setShowExercises(x=>!x)} style={{ fontSize:12, color:C.blue, background:C.blueLight, border:`1px solid ${C.border}`, borderRadius:8, padding:"4px 12px", cursor:"pointer" }}>
                  {showExercises ? "Hide exercises ▲" : "All exercises ▼"}
                </button>
                {showExercises && (
                  <div style={{ marginTop:8, textAlign:"left" }}>
                    {card.exercises.map((ex, i) => (
                      <div key={i} style={{ fontSize:13, color:C.text, marginBottom:4, padding:"4px 8px", background:C.light, borderRadius:6 }}>{ex}</div>
                    ))}
                  </div>
                )}
              </div>
            )}
            {/* Grammar note at bottom */}
            {card.note && (
              <div style={{ background:C.blueLight, borderRadius:10, padding:"8px 14px", fontSize:13, color:C.blue, textAlign:"left", lineHeight:1.6, marginTop:4 }}>{card.note}</div>
            )}
          </div>
        )}
      </div>
      {revealed && (
        <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
          <button onClick={() => { setRevealed(false); setShowExercises(false); onAgain(); }} style={{ padding:"12px 28px", background:"#fff", color:C.red, border:`1.5px solid ${C.red}`, borderRadius:12, cursor:"pointer", fontSize:20, lineHeight:1 }}>✕</button>
          <button onClick={() => { setRevealed(false); setShowExercises(false); onMastered(); }} style={{ padding:"12px 28px", background:"#fff", color:C.green, border:`1.5px solid ${C.green}`, borderRadius:12, cursor:"pointer", fontSize:20, lineHeight:1 }}>✓</button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("Home");
  const [mode, setMode] = useState("casual");
  const [messages, setMessages] = useState([{ role:"assistant", text:"안녕하세요! (Hello!) I'm your Korean tutor. Let's start chatting! You can write in English or try some Korean — I'll help you along the way. 😊", feedback:null }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const todayWord = WORD_OF_THE_DAY[new Date().getDate() % WORD_OF_THE_DAY.length];
  const [fcCategory, setFcCategory] = useState("🌀 Hybrid");
  const [fcIndex, setFcIndex] = useState(0);
  const [fcRevealed, setFcRevealed] = useState(false);
  // fcMastered: tracks indices of "Got it" cards — used to hide them
  const [fcMastered, setFcMastered] = useState(EMPTY_PROGRESS());
  const [fcMissed, setFcMissed] = useState(EMPTY_PROGRESS());
  const [dailyMastered, setDailyMastered] = useState(EMPTY_PROGRESS());
  const [dailyMissed, setDailyMissed] = useState(EMPTY_PROGRESS());
  // Persistent global learned counter (never resets)
  const [globalLearned, setGlobalLearned] = useState(0);
  // Shuffle order per category
  const [fcOrder, setFcOrder] = useState({});
  // Hide "Got it" cards globally
  const [hideGotIt, setHideGotIt] = useState(true);
  // Hint shown for current card
  const [fcHint, setFcHint] = useState(false);
  const [gqIndex, setGqIndex] = useState(0);
  const [gqSelected, setGqSelected] = useState(null);
  const [gqScore, setGqScore] = useState(0);
  const [gqDone, setGqDone] = useState(false);
  // Shuffled grammar questions
  const [gqOrder, setGqOrder] = useState([]);
  const [stats, setStats] = useState({ words:3, grammar:30, msgs:1 });
  const [journal, setJournal] = useState(["Session 1: Started learning Korean basics."]);
  const [goals, setGoals] = useState(INITIAL_GOALS);
  const [proficiency, setProficiency] = useState(1);
  const [b1Sub, setB1Sub] = useState(B1_SUBTABS[0]);
  const [b1Index, setB1Index] = useState(0);
  const [b1Mastered, setB1Mastered] = useState({});
  // B2 state
  const [b2Sub, setB2Sub] = useState(B2_SUBTABS[0]);
  const [b2DeckIndex, setB2DeckIndex] = useState(0);
  const [b2DeckOrder, setB2DeckOrder] = useState([]);
  const [b2DeckMastered, setB2DeckMastered] = useState({});
  const [b2DeckHint, setB2DeckHint] = useState(false);
  const [b2DateIndex, setB2DateIndex] = useState(0);
  const [b2VocabIndex, setB2VocabIndex] = useState(0);
  const [b2GqIndex, setB2GqIndex] = useState(0);
  const [b2GqSelected, setB2GqSelected] = useState(null);
  const [b2GqScore, setB2GqScore] = useState(0);
  const [b2GqDone, setB2GqDone] = useState(false);
  const [b2GqOrder, setB2GqOrder] = useState([]);

  const chatEndRef = useRef(null);
  const convHistory = useRef([]);

  const profLabels = ["","Beginner","Elementary","Intermediate","Advanced","Fluent"];

  // Shuffle helper
  const shuffle = (arr) => {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  };

  // Get or create shuffle order for a category
  const getOrder = (cat, len) => {
    if (fcOrder[cat] && fcOrder[cat].length === len) return fcOrder[cat];
    const order = shuffle(Array.from({length:len},(_,i)=>i));
    setFcOrder(o=>({...o,[cat]:order}));
    return order;
  };

  const currentCards = FLASHCARDS[fcCategory] || [];
  const totalCards = currentCards.length;
  const masteredSet = new Set(fcMastered[fcCategory] || []);

  // Visible cards — filter out "Got it" if hideGotIt is on
  const visibleIndices = hideGotIt
    ? (fcOrder[fcCategory] || Array.from({length:totalCards},(_,i)=>i)).filter(i => !masteredSet.has(i))
    : (fcOrder[fcCategory] || Array.from({length:totalCards},(_,i)=>i));

  const safeIndex = Math.min(fcIndex, Math.max(0, visibleIndices.length - 1));
  const currentOriginalIndex = visibleIndices[safeIndex] ?? 0;
  const currentCard = currentCards[currentOriginalIndex];

  const totalMastered = masteredSet.size;
  const totalMissed = (fcMissed[fcCategory] || []).length;
  const dailyMasteredCount = Object.values(dailyMastered).flat().length;
  const dailyMissedCount = Object.values(dailyMissed).flat().length;
  const isReverse = REVERSE_CATS.has(fcCategory);
  const b1Cards = B1_DATA[b1Sub] || [];
  const b1MasteredCount = Object.keys(b1Mastered).length;
  const b1TotalCount = Object.values(B1_DATA).flat().length;

  // Grammar quiz shuffled
  const currentGqOrder = gqOrder.length === GRAMMAR_QUESTIONS.length ? gqOrder : Array.from({length:GRAMMAR_QUESTIONS.length},(_,i)=>i);
  const currentGq = GRAMMAR_QUESTIONS[currentGqOrder[gqIndex]];

  // B2 deck helpers
  const b2DeckCards = B2_FLASHCARD_DECKS[b2Sub] || [];
  const b2DeckMasteredSet = new Set(b2DeckMastered[b2Sub] || []);
  const b2DeckVisible = (b2DeckOrder.length === b2DeckCards.length ? b2DeckOrder : Array.from({length:b2DeckCards.length},(_,i)=>i))
    .filter(i => !b2DeckMasteredSet.has(i));
  const safeB2DeckIndex = Math.min(b2DeckIndex, Math.max(0, b2DeckVisible.length - 1));
  const currentB2DeckOrigIdx = b2DeckVisible[safeB2DeckIndex] ?? 0;
  const currentB2Card = b2DeckCards[currentB2DeckOrigIdx];

  // B2 grammar quiz
  const currentB2GqOrder = b2GqOrder.length === B2_GRAMMAR_QUESTIONS.length ? b2GqOrder : Array.from({length:B2_GRAMMAR_QUESTIONS.length},(_,i)=>i);
  const currentB2Gq = B2_GRAMMAR_QUESTIONS[currentB2GqOrder[b2GqIndex]];

  const parseFeedback = (text) => {
    const match = text.match(/---FEEDBACK---\s*([\s\S]*?)\s*---END---/);
    const clean = text.replace(/---FEEDBACK---[\s\S]*?---END---/, "").trim();
    let fb = null;
    if (match) { try { fb = JSON.parse(match[1]); } catch {} }
    return { clean, feedback: fb };
  };

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(m => [...m, { role:"user", text:userMsg }]);
    convHistory.current.push({ role:"user", content:userMsg });
    setLoading(true);
    setFeedback(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system: SYSTEM_PROMPT + (mode==="lesson"?"\n\nLESSON MODE: give structured teaching with examples.":""), messages:convHistory.current }),
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || "Sorry, couldn't respond.";
      const { clean, feedback:fb } = parseFeedback(raw);
      convHistory.current.push({ role:"assistant", content:raw });
      setMessages(m => [...m, { role:"assistant", text:clean, feedback:fb }]);
      if (fb) {
        setFeedback(fb);
        if (fb.proficiency) setProficiency(fb.proficiency);
        if (fb.newWords?.length) { setStats(s=>({...s,words:s.words+fb.newWords.length,msgs:s.msgs+1})); setJournal(j=>{const e=`Learned: ${fb.newWords.join(", ")}`;return j.includes(e)?j:[...j,e];}); }
        if (fb.corrections?.length) setStats(s=>({...s,grammar:Math.min(100,s.grammar+5)}));
      }
    } catch { setMessages(m=>[...m,{role:"assistant",text:"Connection error. Please try again.",feedback:null}]); }
    setLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  return (
    <div style={{ fontFamily:"'Segoe UI', sans-serif", background:C.bg, minHeight:"100vh", color:C.text, maxWidth:960, margin:"0 auto" }}>
      {/* Header */}
      <div style={{ background:`linear-gradient(135deg,${C.blue},${C.blueMid})`, padding:"12px 16px", display:"flex", alignItems:"center", position:"sticky", top:0, zIndex:10 }}>
        <span style={{ fontSize:24, marginRight:10 }}>🇰🇷</span>
        <div>
          <div style={{ fontWeight:800, fontSize:18, color:"#fff", letterSpacing:2 }}>KORHYEAN</div>
          <div style={{ fontSize:11, color:"#AED6F1" }}>나의 한국어 선생님</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", background:"#fff", borderBottom:`2px solid ${C.border}`, overflowX:"auto", position:"sticky", top:56, zIndex:9 }}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{ padding:"10px 10px", border:"none", cursor:"pointer", fontWeight:600, fontSize:11, background:"transparent", color:tab===t?C.blue:C.muted, borderBottom:tab===t?`3px solid ${C.red}`:"3px solid transparent", whiteSpace:"nowrap", flex:1 }}>{t}</button>
        ))}
      </div>

      {/* HOME */}
      {tab==="Home" && (
        <div style={{ padding:20 }}>
          {/* Welcome */}
          <div style={{ background:`linear-gradient(135deg,${C.blue},${C.blueMid})`, borderRadius:16, padding:"24px 20px", marginBottom:20, color:"#fff", textAlign:"center" }}>
            <div style={{ fontSize:28, fontWeight:800, marginBottom:4, letterSpacing:1 }}>KORHYEAN</div>
            <div style={{ fontSize:13, opacity:0.85 }}>나의 한국어 선생님 · Your Korean Learning Hub</div>
          </div>

          {/* Nav buttons — no icons */}
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>Go To</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:24 }}>
            {[
              { label:"Flashcards", desc:"Vocab decks by category", tab:"Flashcards" },
              { label:"B1 Review", desc:"Class slides & grammar", tab:"B1" },
              { label:"B2 — 날짜/날씨", desc:"Date, time, weather & more", tab:"B2" },
              { label:"Grammar Quiz", desc:"Test your grammar", tab:"Grammar" },
              { label:"Word of the Day", desc:"Daily vocab deep-dive", tab:"Word" },
              { label:"Chat Tutor", desc:"Practice conversation", tab:"Chat" },
            ].map(({label,desc,tab:t})=>(
              <div key={label} onClick={()=>setTab(t)} style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:12, padding:"14px", cursor:"pointer", boxShadow:"0 1px 4px #0001" }}>
                <div style={{ fontWeight:700, fontSize:13, color:C.blue, marginBottom:2 }}>{label}</div>
                <div style={{ fontSize:11, color:C.muted }}>{desc}</div>
              </div>
            ))}
          </div>

          {/* Progress */}
          <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:18 }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:12 }}>Progress</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:12, padding:"12px 14px" }}>
                <div style={{ fontSize:10, fontWeight:700, color:C.green, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>Today</div>
                <div style={{ display:"flex", justifyContent:"space-around" }}>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.green }}>{dailyMasteredCount}</div><div style={{ fontSize:10, color:C.muted }}>Knew</div></div>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.red }}>{dailyMissedCount}</div><div style={{ fontSize:10, color:C.muted }}>Again</div></div>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.blue }}>{stats.msgs}</div><div style={{ fontSize:10, color:C.muted }}>Msgs</div></div>
                </div>
              </div>
              <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:12, padding:"12px 14px" }}>
                <div style={{ fontSize:10, fontWeight:700, color:C.blue, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>All Time</div>
                <div style={{ display:"flex", justifyContent:"space-around" }}>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.blue }}>{globalLearned}</div><div style={{ fontSize:10, color:C.muted }}>Learned</div></div>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.green }}>{`${b1MasteredCount}/${b1TotalCount}`}</div><div style={{ fontSize:10, color:C.muted }}>B1</div></div>
                  <div style={{ textAlign:"center" }}><div style={{ fontSize:20, fontWeight:800, color:C.red }}>{stats.words}</div><div style={{ fontSize:10, color:C.muted }}>Words</div></div>
                </div>
              </div>
            </div>
            {[
              { label:"Vocabulary", val:Math.min(100,stats.words*4), color:C.blue },
              { label:"Grammar", val:stats.grammar, color:C.green },
              { label:"Flashcards", val:Math.round(Object.values(fcMastered).flat().length/ALL_CARDS.length*100)||0, color:C.blue },
              { label:"B1 Review", val:Math.round(b1MasteredCount/b1TotalCount*100)||0, color:C.green },
            ].map(({label,val,color})=>(
              <div key={label} style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
                  <span style={{ color:C.muted }}>{label}</span><span style={{ color, fontWeight:700 }}>{val}%</span>
                </div>
                <div style={{ height:6, background:C.light, borderRadius:10, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${val}%`, background:color, borderRadius:10 }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CHAT */}
      {tab==="Chat" && (
        <div style={{ display:"flex", height:"calc(100vh - 108px)" }}>
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"8px 12px", background:"#fff", display:"flex", gap:8, borderBottom:`1px solid ${C.border}` }}>
              {["casual","lesson"].map(m=>(
                <button key={m} onClick={()=>setMode(m)} style={{ padding:"4px 14px", borderRadius:20, border:`1.5px solid ${mode===m?C.blue:C.border}`, background:mode===m?C.blueLight:"#fff", color:mode===m?C.blue:C.muted, fontWeight:600, fontSize:12, cursor:"pointer" }}>
                  {m==="casual"?"💬 Casual":"📚 Lesson"}
                </button>
              ))}
            </div>
            <div style={{ flex:1, overflowY:"auto", padding:12, display:"flex", flexDirection:"column", gap:10 }}>
              {messages.map((m,i)=>(
                <div key={i} style={{ display:"flex", flexDirection:m.role==="user"?"row-reverse":"row", gap:6 }}>
                  <div style={{ maxWidth:"75%", background:m.role==="user"?C.redLight:"#fff", borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px", padding:"10px 14px", fontSize:14, lineHeight:1.6, border:`1px solid ${m.role==="user"?"#F1948A":C.border}` }}>{m.text}</div>
                </div>
              ))}
              {loading && <div style={{ fontSize:13, color:C.muted }}>튜터가 답변 중… ✍️</div>}
              <div ref={chatEndRef} />
            </div>
            {feedback && (
              <div style={{ background:C.blueLight, borderTop:`1px solid #AED6F1`, padding:"8px 12px", fontSize:12 }}>
                {feedback.praise?.[0] && <div style={{ color:C.green }}>✅ {feedback.praise[0]}</div>}
                {feedback.corrections?.[0] && <div style={{ color:C.red, marginTop:2 }}>💡 {feedback.corrections[0]}</div>}
                {feedback.tip && <div style={{ color:C.blue, marginTop:2 }}>🔑 {feedback.tip}</div>}
              </div>
            )}
            <div style={{ padding:"10px 12px", background:"#fff", borderTop:`1px solid ${C.border}`, display:"flex", gap:8 }}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Type in Korean or English…" style={{ flex:1, background:C.bg, border:`1.5px solid ${C.border}`, borderRadius:12, padding:"10px 14px", fontSize:14, outline:"none" }} />
              <button onClick={sendMessage} disabled={loading} style={{ padding:"10px 16px", background:loading?C.muted:C.blue, color:"#fff", border:"none", borderRadius:12, cursor:"pointer", fontWeight:700, fontSize:16 }}>→</button>
            </div>
          </div>
          <div style={{ width:220, background:"#fff", borderLeft:`1px solid ${C.border}`, padding:14, overflowY:"auto", display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ fontWeight:700, fontSize:13, color:C.blue }}>📡 Live Feedback</div>
            {!feedback ? <div style={{ fontSize:12, color:C.muted }}>Send a message to get feedback…</div> : (
              <>
                {feedback.corrections?.length>0 && <div><div style={{ fontSize:11, fontWeight:700, color:C.red, marginBottom:4 }}>CORRECTIONS</div>{feedback.corrections.map((c,i)=><div key={i} style={{ fontSize:12, color:C.text, marginBottom:4, background:C.redLight, borderRadius:8, padding:"4px 8px" }}>💡 {c}</div>)}</div>}
                {feedback.praise?.length>0 && <div><div style={{ fontSize:11, fontWeight:700, color:C.green, marginBottom:4 }}>PRAISE</div>{feedback.praise.map((p,i)=><div key={i} style={{ fontSize:12, color:C.text, marginBottom:4, background:C.greenLight, borderRadius:8, padding:"4px 8px" }}>✅ {p}</div>)}</div>}
                {feedback.tip && <div><div style={{ fontSize:11, fontWeight:700, color:C.blue, marginBottom:4 }}>TIP</div><div style={{ fontSize:12, color:C.text, background:C.blueLight, borderRadius:8, padding:"4px 8px" }}>🔑 {feedback.tip}</div></div>}
                {feedback.newWords?.length>0 && <div><div style={{ fontSize:11, fontWeight:700, color:C.blue, marginBottom:4 }}>NEW WORDS</div>{feedback.newWords.map((w,i)=><div key={i} style={{ fontSize:12, color:C.text, marginBottom:4, background:C.blueLight, borderRadius:8, padding:"4px 8px" }}>{w}</div>)}</div>}
              </>
            )}
            <div style={{ marginTop:"auto" }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.blue, marginBottom:8 }}>🎯 GOALS</div>
              {goals.map(g=>(
                <div key={g.id} onClick={()=>setGoals(gs=>gs.map(x=>x.id===g.id?{...x,done:!x.done}:x))} style={{ fontSize:11, color:g.done?C.green:C.muted, marginBottom:6, cursor:"pointer", display:"flex", gap:6, alignItems:"flex-start" }}>
                  <span>{g.done?"✅":"⬜"}</span><span style={{ textDecoration:g.done?"line-through":"none" }}>{g.text}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* FLASHCARDS */}
      {tab==="Flashcards" && (
        <div style={{ padding:16 }}>
          {/* Category pills */}
          <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8, marginBottom:12 }}>
            {ALL_CATS.map(cat=>(
              <button key={cat} onClick={()=>{
                setFcCategory(cat);
                setFcIndex(0);
                setFcRevealed(false);
                setFcHint(false);
                // Shuffle on category change
                const len = (FLASHCARDS[cat]||[]).length;
                setFcOrder(o=>({...o,[cat]:shuffle(Array.from({length:len},(_,i)=>i))}));
              }} style={{ padding:"6px 14px", borderRadius:20, border:`1.5px solid ${fcCategory===cat?C.blue:C.border}`, background:fcCategory===cat?C.blueLight:"#fff", color:fcCategory===cat?C.blue:C.muted, fontWeight:600, fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>
                {cat}
              </button>
            ))}
          </div>

          {/* Reverse mode badge */}
          {isReverse && (
            <div style={{ background:C.blueLight, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 12px", fontSize:12, color:C.blue, marginBottom:10 }}>
              Reverse mode — English shown, guess the Korean
            </div>
          )}

          {/* Controls row */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontSize:13, color:C.muted }}>
              {visibleIndices.length > 0 ? `${safeIndex+1} / ${visibleIndices.length}` : "All done!"} · <span style={{ color:C.green }}>{totalMastered} knew</span>
            </div>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={()=>{
                setFcMastered(p=>({...p,[fcCategory]:[]}));
              }} style={{ fontSize:11, padding:"4px 10px", background:"none", border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", color:C.muted }}>Reset ✓</button>
              <div style={{ fontSize:11, padding:"4px 10px", background:C.blueLight, borderRadius:8, color:C.blue, fontWeight:700 }}>
                🎓 {globalLearned} learned
              </div>
            </div>
          </div>

          {visibleIndices.length > 0 && currentCard ? (
            <>
              {/* Card — tap to reveal */}
              <div
                onClick={() => { if (!fcRevealed) { setFcRevealed(true); setFcHint(false); } }}
                style={{ background:"#fff", borderRadius:16, padding:"32px 24px", textAlign:"center", border:`1.5px solid ${fcRevealed?C.blue:C.border}`, marginBottom:14, minHeight:180, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", position:"relative", transition:"border-color 0.2s", cursor: fcRevealed ? "default" : "pointer" }}
              >
                {!fcRevealed && <div style={{ fontSize:11, color:C.muted, marginBottom:8, letterSpacing:1 }}>TAP TO REVEAL</div>}
                {isReverse ? (
                  <>
                    <div style={{ fontSize:11, fontWeight:600, color:C.muted, textTransform:"uppercase", letterSpacing:0.5, marginBottom:8 }}>
                      {fcCategory === "Conversations" ? (currentCard.level?.toUpperCase() || "PHRASE") : "ENGLISH"}
                    </div>
                    <div style={{ fontSize:fcCategory==="Conversations"?17:24, fontWeight:700, color:C.text, marginBottom:8, lineHeight:1.4 }}>
                      {currentCard.en}
                    </div>
                    {/* Hint */}
                    {!fcRevealed && (
                      <div style={{ display:"flex", gap:8, marginTop:4 }}>
                        {!fcHint && FC_EXAMPLES[currentCard.kr] && (
                          <button onClick={e=>{e.stopPropagation();setFcHint(true);}} style={{ fontSize:11, padding:"4px 10px", background:"none", border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", color:C.muted }}>hint</button>
                        )}
                        {fcHint && FC_EXAMPLES[currentCard.kr] && (
                          <div style={{ fontSize:12, color:C.muted, fontStyle:"italic", background:C.light, borderRadius:8, padding:"4px 10px" }}>{FC_EXAMPLES[currentCard.kr].kr}</div>
                        )}
                      </div>
                    )}
                    {fcRevealed && (
                      <div style={{ marginTop:10, borderTop:`1px solid ${C.border}`, paddingTop:10, width:"100%" }}>
                        <div style={{ fontSize:fcCategory==="Conversations"?20:32, fontWeight:800, color:C.blue, marginBottom:4 }}>{currentCard.kr}</div>
                        <div style={{ fontSize:13, color:C.muted, fontStyle:"italic", marginBottom:6 }}>{currentCard.rom}</div>
                        {FC_EXAMPLES[currentCard.kr] && (
                          <div style={{ background:C.blueLight, borderRadius:8, padding:"6px 10px", fontSize:12, color:C.blue, textAlign:"left", marginTop:4 }}>
                            <div style={{ fontWeight:600 }}>{FC_EXAMPLES[currentCard.kr].kr}</div>
                            <div style={{ color:C.muted, marginTop:2 }}>{FC_EXAMPLES[currentCard.kr].en}</div>
                          </div>
                        )}
                      </div>
                    )}
                  </>
                ) : (
                  <>
                    <div style={{ fontSize:36, fontWeight:800, color:C.blue, marginBottom:8 }}>{currentCard.kr}</div>
                    <div style={{ fontSize:14, color:C.muted }}>{currentCard.rom}</div>
                    {/* Hint */}
                    {!fcRevealed && (
                      <div style={{ marginTop:8, display:"flex", gap:8, justifyContent:"center" }}>
                        {!fcHint && FC_EXAMPLES[currentCard.kr] && (
                          <button onClick={e=>{e.stopPropagation();setFcHint(true);}} style={{ fontSize:11, padding:"4px 10px", background:"none", border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", color:C.muted }}>hint</button>
                        )}
                        {fcHint && FC_EXAMPLES[currentCard.kr] && (
                          <div style={{ fontSize:12, color:C.muted, fontStyle:"italic", background:C.light, borderRadius:8, padding:"4px 10px" }}>{FC_EXAMPLES[currentCard.kr].kr}</div>
                        )}
                      </div>
                    )}
                    {fcRevealed && (
                      <div style={{ marginTop:12, borderTop:`1px solid ${C.border}`, paddingTop:10, width:"100%", textAlign:"center" }}>
                        <div style={{ fontSize:18, fontWeight:600, color:C.text, marginBottom:6 }}>{currentCard.en}</div>
                        {FC_EXAMPLES[currentCard.kr] && (
                          <div style={{ background:C.blueLight, borderRadius:8, padding:"6px 10px", fontSize:12, color:C.blue, textAlign:"left" }}>
                            <div style={{ fontWeight:600 }}>{FC_EXAMPLES[currentCard.kr].kr}</div>
                            <div style={{ color:C.muted, marginTop:2 }}>{FC_EXAMPLES[currentCard.kr].en}</div>
                          </div>
                        )}
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* ✕ / ✓ buttons — only shown after reveal */}
              {fcRevealed && (
                <div style={{ display:"flex", gap:10, justifyContent:"center", marginBottom:12 }}>
                  <button onClick={()=>{
                    setFcMissed(p=>{const arr=[...(p[fcCategory]||[])];if(!arr.includes(currentOriginalIndex))arr.push(currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    setDailyMissed(p=>{const arr=[...(p[fcCategory]||[])];if(!arr.includes(currentOriginalIndex))arr.push(currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    setFcMastered(p=>{const arr=(p[fcCategory]||[]).filter((x) =>x!==currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    setFcIndex(i=>(i+1)%Math.max(1,visibleIndices.length));setFcRevealed(false);setFcHint(false);
                  }} style={{ padding:"12px 32px", background:"#fff", color:C.red, border:`1.5px solid ${C.red}`, borderRadius:12, cursor:"pointer", fontSize:22, lineHeight:1 }}>✕</button>
                  <button onClick={()=>{
                    const alreadyMastered = masteredSet.has(currentOriginalIndex);
                    setFcMastered(p=>{const arr=[...(p[fcCategory]||[])];if(!arr.includes(currentOriginalIndex))arr.push(currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    setDailyMastered(p=>{const arr=[...(p[fcCategory]||[])];if(!arr.includes(currentOriginalIndex))arr.push(currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    setFcMissed(p=>{const arr=(p[fcCategory]||[]).filter((x) =>x!==currentOriginalIndex);return{...p,[fcCategory]:arr}});
                    if (!alreadyMastered) setGlobalLearned(n=>n+1);
                    setFcIndex(i=>(i)%Math.max(1,visibleIndices.length));setFcRevealed(false);setFcHint(false);
                  }} style={{ padding:"12px 32px", background:"#fff", color:C.green, border:`1.5px solid ${C.green}`, borderRadius:12, cursor:"pointer", fontSize:22, lineHeight:1 }}>✓</button>
                </div>
              )}

              {/* Prev/Next */}
              <div style={{ display:"flex", justifyContent:"center", gap:8, marginBottom:16 }}>
                <button onClick={()=>{setFcIndex(i=>(i-1+visibleIndices.length)%Math.max(1,visibleIndices.length));setFcRevealed(false);setFcHint(false);}} style={{ padding:"7px 18px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontSize:13 }}>← Prev</button>
                <button onClick={()=>{setFcIndex(i=>(i+1)%Math.max(1,visibleIndices.length));setFcRevealed(false);setFcHint(false);}} style={{ padding:"7px 18px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontSize:13 }}>Next →</button>
              </div>

              {/* Dots at bottom */}
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, justifyContent:"center" }}>
                {visibleIndices.map((origI,i)=>{
                  const missed=(fcMissed[fcCategory]||[]).includes(origI);
                  const isCurrent=i===safeIndex;
                  return <div key={origI} onClick={()=>{setFcIndex(i);setFcRevealed(false);setFcHint(false);}} style={{ width:isCurrent?13:9, height:isCurrent?13:9, borderRadius:"50%", background:missed?C.red:"#CBD5E1", border:isCurrent?`2px solid ${C.blue}`:"2px solid transparent", cursor:"pointer", transition:"all 0.15s", flexShrink:0 }} />;
                })}
              </div>
            </>
          ) : (
            <div style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:40 }}>🎉</div>
              <div style={{ fontWeight:700, color:C.blue, fontSize:16, marginTop:8 }}>All cards learned in this deck!</div>
              <button onClick={()=>setFcMastered(p=>({...p,[fcCategory]:[]}))} style={{ marginTop:16, padding:"10px 24px", background:C.blue, color:"#fff", border:"none", borderRadius:10, cursor:"pointer", fontWeight:600 }}>Reset & Reshuffle</button>
            </div>
          )}
        </div>
      )}

      {/* GRAMMAR */}
      {tab==="Grammar" && (
        <div style={{ padding:16 }}>
          <h2 style={{ color:C.blue, fontSize:18, marginBottom:16 }}>📝 Grammar Quiz</h2>
          {!gqDone ? (
            <>
              <div style={{ background:"#fff", borderRadius:16, padding:20, border:`1px solid ${C.border}`, marginBottom:16 }}>
                <div style={{ fontSize:13, color:C.muted, marginBottom:8 }}>Question {gqIndex+1} of {GRAMMAR_QUESTIONS.length}</div>
                <div style={{ fontWeight:700, fontSize:16, color:C.text, marginBottom:16 }}>{currentGq.q}</div>
                {currentGq.opts.map((opt,i)=>(
                  <button key={i} onClick={()=>{if(gqSelected!==null)return;setGqSelected(i);if(i===currentGq.ans)setGqScore(s=>s+1);}}
                    style={{ display:"block", width:"100%", padding:"10px 16px", marginBottom:8, borderRadius:12, border:`1.5px solid ${gqSelected===null?C.border:i===currentGq.ans?"#1E8449":i===gqSelected?C.red:C.border}`, background:gqSelected===null?"#fff":i===currentGq.ans?"#D5F5E3":i===gqSelected?C.redLight:"#fff", cursor:gqSelected===null?"pointer":"default", textAlign:"left", fontSize:14, fontWeight:500 }}>
                    {opt}
                  </button>
                ))}
                {gqSelected!==null && <div style={{ background:C.blueLight, borderRadius:10, padding:"10px 14px", fontSize:13, color:C.blue, marginTop:8 }}>💡 {currentGq.exp}</div>}
              </div>
              {gqSelected!==null && <button onClick={()=>{if(gqIndex+1>=GRAMMAR_QUESTIONS.length){setGqDone(true);setStats(s=>({...s,grammar:Math.min(100,s.grammar+10)}))}else{setGqIndex(i=>i+1);setGqSelected(null);}}} style={{ padding:"12px 28px", background:C.blue, border:"none", borderRadius:12, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:15 }}>{gqIndex+1>=GRAMMAR_QUESTIONS.length?"Finish":"Next Question →"}</button>}
            </>
          ) : (
            <div style={{ textAlign:"center", padding:32 }}>
              <div style={{ fontSize:52 }}>{gqScore>=Math.round(GRAMMAR_QUESTIONS.length*0.85)?"🏆":gqScore>=Math.round(GRAMMAR_QUESTIONS.length*0.6)?"⭐":"📚"}</div>
              <div style={{ fontSize:30, fontWeight:700, color:C.blue, marginTop:12 }}>{gqScore}/{GRAMMAR_QUESTIONS.length}</div>
              <div style={{ color:C.muted, marginTop:8 }}>{gqScore===GRAMMAR_QUESTIONS.length?"Perfect! 대단해요!":"Keep going! 화이팅!"}</div>
              <button onClick={()=>{
                setGqOrder(shuffle(Array.from({length:GRAMMAR_QUESTIONS.length},(_,i)=>i)));
                setGqIndex(0);setGqSelected(null);setGqScore(0);setGqDone(false);
              }} style={{ marginTop:20, padding:"12px 28px", background:C.red, border:"none", borderRadius:12, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:15 }}>Try Again</button>
            </div>
          )}
        </div>
      )}

      {/* WORD OF THE DAY */}
      {tab==="Word" && (
        <div style={{ padding:16, maxWidth:560, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <h2 style={{ color:C.blue, fontSize:18, margin:0 }}>✨ Word of the Day</h2>
            <div style={{ background:C.blueLight, color:C.blue, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:600 }}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
          </div>
          <div style={{ background:`linear-gradient(135deg,${C.blue},${C.blueMid})`, borderRadius:20, padding:"28px 24px", textAlign:"center", marginBottom:14, boxShadow:"0 4px 20px #1A527622" }}>
            <div style={{ fontSize:44, fontWeight:800, color:"#fff", letterSpacing:1 }}>{todayWord.kr}</div>
            <div style={{ fontSize:16, color:"#AED6F1", marginTop:6 }}>{todayWord.rom}</div>
            <div style={{ marginTop:12, background:"rgba(255,255,255,0.15)", borderRadius:12, padding:"8px 18px", display:"inline-block" }}>
              <span style={{ fontSize:15, color:"#fff", fontWeight:600 }}>{todayWord.en}</span>
            </div>
          </div>
          <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.red, marginBottom:6, textTransform:"uppercase", letterSpacing:0.5 }}>📜 Word Origin</div>
            <div style={{ fontSize:14, color:C.text, lineHeight:1.7 }}>{todayWord.origin}</div>
          </div>
          <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.red, marginBottom:8, textTransform:"uppercase", letterSpacing:0.5 }}>💡 When to Use It</div>
            {todayWord.uses.map((u,i)=>(
              <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom:4 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:C.blue, flexShrink:0, marginTop:6 }} />
                <span style={{ fontSize:14, color:C.text, lineHeight:1.6 }}>{u}</span>
              </div>
            ))}
          </div>
          <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:700, color:C.red, marginBottom:10, textTransform:"uppercase", letterSpacing:0.5 }}>🗣️ Example Sentences</div>
            {todayWord.examples.map((ex,i)=>(
              <div key={i} style={{ background:C.blueLight, borderRadius:12, padding:"12px 14px", borderLeft:`3px solid ${C.blue}`, marginBottom:8 }}>
                <div style={{ fontSize:15, fontWeight:700, color:C.blue, marginBottom:3 }}>{ex.kr}</div>
                <div style={{ fontSize:12, color:C.blueMid, marginBottom:4, fontStyle:"italic" }}>{ex.rom}</div>
                <div style={{ fontSize:13, color:C.text }}>{ex.en}</div>
              </div>
            ))}
          </div>
          <div style={{ background:"#FFFBEB", border:"1px solid #FCD34D", borderRadius:14, padding:"14px 16px" }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#92400E", marginBottom:6, textTransform:"uppercase", letterSpacing:0.5 }}>🌟 Pro Tip</div>
            <div style={{ fontSize:14, color:"#78350F", lineHeight:1.7 }}>{todayWord.tip}</div>
          </div>
        </div>
      )}

      {/* B1 REVIEW */}
      {tab==="B1" && (
        <div style={{ padding:16 }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <div>
              <h2 style={{ color:C.blue, fontSize:17, margin:0, fontWeight:700 }}>B1 Class Review</h2>
              <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>세종실용한국어 1</div>
            </div>
            <div style={{ background:C.blueLight, color:C.blue, borderRadius:16, padding:"4px 12px", fontSize:12, fontWeight:600 }}>
              {b1MasteredCount}/{b1TotalCount}
            </div>
          </div>

          {/* Subtabs */}
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:16 }}>
            {B1_SUBTABS.map(st=>(
              <button key={st} onClick={()=>{setB1Sub(st);setB1Index(0);}} style={{ padding:"6px 12px", borderRadius:16, border:`1.5px solid ${b1Sub===st?C.blue:C.border}`, background:b1Sub===st?C.blueLight:"#fff", color:b1Sub===st?C.blue:C.muted, fontWeight:600, fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
                {st}
              </button>
            ))}
          </div>

          {/* Flashcard */}
          {b1Cards.length > 0 && (
            <B1Card
              card={b1Cards[b1Index]}
              index={b1Index}
              total={b1Cards.length}
              onMastered={()=>{ setB1Mastered(p=>({...p,[b1Sub+"_"+b1Index]:true})); setB1Index(i=>(i+1)%b1Cards.length); }}
              onAgain={()=>setB1Index(i=>(i+1)%b1Cards.length)}
            />
          )}

          {/* Nav */}
          <div style={{ display:"flex", justifyContent:"center", gap:8, marginTop:14 }}>
            <button onClick={()=>setB1Index(i=>(i-1+b1Cards.length)%b1Cards.length)} style={{ padding:"8px 20px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontWeight:600 }}>← Prev</button>
            <button onClick={()=>setB1Index(i=>(i+1)%b1Cards.length)} style={{ padding:"8px 20px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontWeight:600 }}>Next →</button>
          </div>
        </div>
      )}

      {/* B2 */}
      {tab==="B2" && (
        <div style={{ padding:16 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
            <div>
              <h2 style={{ color:C.blue, fontSize:17, margin:0, fontWeight:700 }}>B2 — 날짜·날씨·시간</h2>
              <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>Date, Time, Weather & More</div>
            </div>
            <div style={{ background:C.blueLight, color:C.blue, borderRadius:16, padding:"4px 12px", fontSize:12, fontWeight:600 }}>
              {Object.values(b2DeckMastered).flat().length} learned
            </div>
          </div>

          {/* Subtabs */}
          <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:16 }}>
            {B2_SUBTABS.map(st=>(
              <button key={st} onClick={()=>{
                setB2Sub(st);setB2DeckIndex(0);setB2DeckHint(false);
                const len=(B2_FLASHCARD_DECKS[st]||[]).length;
                if(len>0) setB2DeckOrder(shuffle(Array.from({length:len},(_,i)=>i)));
              }} style={{ padding:"6px 12px", borderRadius:16, border:`1.5px solid ${b2Sub===st?C.blue:C.border}`, background:b2Sub===st?C.blueLight:"#fff", color:b2Sub===st?C.blue:C.muted, fontWeight:600, fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
                {st}
              </button>
            ))}
          </div>

          {/* Flashcard decks */}
          {B2_FLASHCARD_DECKS[b2Sub] && b2DeckVisible.length > 0 && currentB2Card && (
            <>
              <div style={{ fontSize:12, color:C.muted, marginBottom:8 }}>
                {safeB2DeckIndex+1} / {b2DeckVisible.length} · <span style={{ color:C.green }}>{b2DeckMasteredSet.size} knew</span>
              </div>
              <B2FlashCard
                card={currentB2Card}
                showHint={b2DeckHint}
                onHint={()=>setB2DeckHint(true)}
                onMastered={()=>{
                  setB2DeckMastered(p=>{const arr=[...(p[b2Sub]||[])];if(!arr.includes(currentB2DeckOrigIdx))arr.push(currentB2DeckOrigIdx);return{...p,[b2Sub]:arr};});
                  setGlobalLearned(n=>n+1);
                  setB2DeckIndex(i=>(i)%Math.max(1,b2DeckVisible.length));
                  setB2DeckHint(false);
                }}
                onAgain={()=>{setB2DeckIndex(i=>(i+1)%Math.max(1,b2DeckVisible.length));setB2DeckHint(false);}}
                isGotIt={false}
              />
              <div style={{ display:"flex", justifyContent:"center", gap:8, marginTop:8 }}>
                <button onClick={()=>{setB2DeckIndex(i=>(i-1+b2DeckVisible.length)%Math.max(1,b2DeckVisible.length));setB2DeckHint(false);}} style={{ padding:"7px 18px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontSize:13 }}>← Prev</button>
                <button onClick={()=>{setB2DeckIndex(i=>(i+1)%Math.max(1,b2DeckVisible.length));setB2DeckHint(false);}} style={{ padding:"7px 18px", background:C.light, border:"none", borderRadius:10, cursor:"pointer", color:C.text, fontSize:13 }}>Next →</button>
              </div>
              <div style={{ display:"flex", gap:6, justifyContent:"center", marginTop:12 }}>
                <button onClick={()=>{setB2DeckMastered(p=>({...p,[b2Sub]:[]}))} } style={{ fontSize:11, padding:"4px 10px", background:"none", border:`1px solid ${C.border}`, borderRadius:8, cursor:"pointer", color:C.muted }}>Reset ✓</button>
              </div>
            </>
          )}
          {B2_FLASHCARD_DECKS[b2Sub] && b2DeckVisible.length === 0 && (
            <div style={{ textAlign:"center", padding:24 }}>
              <div style={{ fontSize:36 }}>🎉</div>
              <div style={{ fontWeight:700, color:C.blue, marginTop:8 }}>All cards mastered!</div>
              <button onClick={()=>setB2DeckMastered(p=>({...p,[b2Sub]:[]}))} style={{ marginTop:12, padding:"10px 20px", background:C.blue, color:"#fff", border:"none", borderRadius:10, cursor:"pointer", fontWeight:600 }}>Reset</button>
            </div>
          )}

          {/* Date & Time cards (시간 Time / 날짜 Date subtabs) */}
          {b2Sub==="시간 Time" && (
            <div style={{ marginTop:16 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue, marginBottom:8 }}>⏰ Date & Time Reference Cards</div>
              {B2_DATE_TIME_CARDS.filter(c=>c.q.includes("시") || c.q.includes("time") || c.q.includes("hour") || c.q.includes("minute") || c.q.includes("AM") || c.q.includes("PM") || c.q.includes("half")).map((card,i)=>(
                <DateTimeCard key={i} card={card} />
              ))}
            </div>
          )}
          {b2Sub==="날짜 Date" && (
            <div style={{ marginTop:16 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue, marginBottom:8 }}>📅 Date Reference Cards</div>
              {B2_DATE_TIME_CARDS.filter(c=>c.q.includes("month") || c.q.includes("date") || c.q.includes("year") || c.q.includes("day") || c.q.includes("생일") || c.q.includes("고향")).map((card,i)=>(
                <DateTimeCard key={i} card={card} />
              ))}
            </div>
          )}
          {b2Sub==="시간 입자 Time Particle" && (
            <div style={{ marginTop:16 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue, marginBottom:8 }}>📌 Time Particle 에 Rules</div>
              {B2_VOCAB_CARDS.map((card,i)=>(
                <DateTimeCard key={i} card={card} />
              ))}
            </div>
          )}

          {/* B2 Grammar Quiz */}
          {b2Sub==="안/지않다 Negation" && (
            <div style={{ marginTop:20 }}>
              <div style={{ fontSize:13, fontWeight:700, color:C.blue, marginBottom:8 }}>🧠 B2 Grammar Quiz</div>
              {!b2GqDone ? (
                <>
                  <div style={{ background:"#fff", borderRadius:16, padding:20, border:`1px solid ${C.border}`, marginBottom:12 }}>
                    <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>Question {b2GqIndex+1} of {B2_GRAMMAR_QUESTIONS.length}</div>
                    <div style={{ fontWeight:700, fontSize:15, color:C.text, marginBottom:14 }}>{currentB2Gq.q}</div>
                    {currentB2Gq.opts.map((opt,i)=>(
                      <button key={i} onClick={()=>{if(b2GqSelected!==null)return;setB2GqSelected(i);if(i===currentB2Gq.ans)setB2GqScore(s=>s+1);}}
                        style={{ display:"block", width:"100%", padding:"9px 14px", marginBottom:7, borderRadius:10, border:`1.5px solid ${b2GqSelected===null?C.border:i===currentB2Gq.ans?"#1E8449":i===b2GqSelected?C.red:C.border}`, background:b2GqSelected===null?"#fff":i===currentB2Gq.ans?"#D5F5E3":i===b2GqSelected?C.redLight:"#fff", cursor:b2GqSelected===null?"pointer":"default", textAlign:"left", fontSize:13 }}>
                        {opt}
                      </button>
                    ))}
                    {b2GqSelected!==null && <div style={{ background:C.blueLight, borderRadius:10, padding:"8px 12px", fontSize:12, color:C.blue, marginTop:6 }}>💡 {currentB2Gq.exp}</div>}
                  </div>
                  {b2GqSelected!==null && (
                    <button onClick={()=>{if(b2GqIndex+1>=B2_GRAMMAR_QUESTIONS.length){setB2GqDone(true);}else{setB2GqIndex(i=>i+1);setB2GqSelected(null);}}}
                      style={{ padding:"11px 24px", background:C.blue, border:"none", borderRadius:10, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14 }}>
                      {b2GqIndex+1>=B2_GRAMMAR_QUESTIONS.length?"Finish":"Next →"}
                    </button>
                  )}
                </>
              ) : (
                <div style={{ textAlign:"center", padding:24 }}>
                  <div style={{ fontSize:48 }}>{b2GqScore>=Math.round(B2_GRAMMAR_QUESTIONS.length*0.85)?"🏆":b2GqScore>=Math.round(B2_GRAMMAR_QUESTIONS.length*0.6)?"⭐":"📚"}</div>
                  <div style={{ fontSize:28, fontWeight:700, color:C.blue, marginTop:8 }}>{b2GqScore}/{B2_GRAMMAR_QUESTIONS.length}</div>
                  <div style={{ color:C.muted, marginTop:6 }}>{b2GqScore===B2_GRAMMAR_QUESTIONS.length?"Perfect! 완벽해요!":"화이팅! Keep it up!"}</div>
                  <button onClick={()=>{
                    setB2GqOrder(shuffle(Array.from({length:B2_GRAMMAR_QUESTIONS.length},(_,i)=>i)));
                    setB2GqIndex(0);setB2GqSelected(null);setB2GqScore(0);setB2GqDone(false);
                  }} style={{ marginTop:16, padding:"11px 24px", background:C.red, border:"none", borderRadius:10, color:"#fff", cursor:"pointer", fontWeight:700 }}>Try Again</button>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      <style>{`
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: ${C.bg}; }
        ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 4px; }
        input::placeholder { color: ${C.muted}; }
      `}</style>
    </div>
  );
}


    // React 18 root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>

  <script>
    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
